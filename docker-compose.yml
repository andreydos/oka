services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: oka
      POSTGRES_PASSWORD: oka
      POSTGRES_DB: oka
    command: postgres -c shared_buffers=128MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oka"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 768M

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./docker/init-ollama.sh:/init-ollama.sh:ro
    entrypoint: ["/bin/sh", "/init-ollama.sh"]
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
    deploy:
      resources:
        limits:
          memory: 6G

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://oka:oka@postgres:5432/oka
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      UPLOAD_DIR: /data/uploads
      RELEVANCE_THRESHOLD: ${RELEVANCE_THRESHOLD:-0.5}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      ML_MUTEX_ENABLED: ${ML_MUTEX_ENABLED:-true}
      TOP_K: ${TOP_K:-5}
      CORS_ORIGINS: http://localhost:3000,http://localhost
    volumes:
      - upload_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  qdrant_data:
  ollama_models:
  upload_data:
